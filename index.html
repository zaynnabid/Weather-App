<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="utf-8" />
    

    <title>Weather App</title>
    <link rel="stylesheet" href="./style.css">
   
    <script src="script.js" defer></script>

</head>

<body>

  <div class ="card" >
    <div class ="search">
      
      <input type="text" placeholder="Enter City Name" >

      <button > <img src="assets/images/search.png">
      </button>
 </div>

 <div class="calendar-toolbar">
  <button id="openCalendarBtn" class="calendar-btn">📅</button>
</div>




<div class = "weather">
 <img  src="assets/images/rain.png" class ="weather_icon">

  <h1 class="temp" > </h1>

  <h2 class="city" > </h2>

  <div class="details">


    <!--For humidity -->

    <div class="col">
      <img src="assets/images/humidity.png" >
      <div>
        <p class="humidity">  </p>
        <p> Humidity </p>

      </div>
    </div>
 
    <!-- for Wind -->

    <div class="col">
      <img src="assets/images/wind.png" >
      <div>
        <p class="wind">  </p>
        <p> Wind Speed </p>
      </div>
    </div>

  </div>  <!-- Detail wala div ider end howa ha-->
</div>    <!-- Weather wala  div ider end howa ha -->


<!-- calendar moda  -->


<div id="calendarModal" class="calendar-modal" hidden> <!-- hidden islya so it will not appear on when open the page -->

  <div class="calendar-modal-content">

    <span id="closeCalendarBtn" class="calendar-close">&times;</span>
    <h3>Add Event</h3>
    
    <form id="calendarForm">
    
      <label>
        Event Title:
        <input type="text" id="eventTitle" required />
      </label>
    
      <label>
        Date:
        <input type="date" id="eventDate" required />
      </label>
    
      <label>
        Time:
        <input type="time" id="eventTime" required />
      </label>
    
      <button type="submit" class="calendar-save">Save Event</button>
    
    </form>
  
  </div>
</div>


</body>
</html>
